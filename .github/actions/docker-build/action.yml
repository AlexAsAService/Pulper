name: 'Pulper Docker Build'
description: 'Builds a specific target of the Pulper Dockerfile with GHA caching'

outputs:
  image-ref:
    description: 'The full reference of the built image'
    value: ${{ steps.build.outputs.imageid }}

inputs:
  target:
    description: 'The Dockerfile target to build (minimal, full, shim)'
    required: true
  tags:
    description: 'Docker tags to apply'
    required: true
  # -- OPTIONAL --
  load:
    description: 'Whether to load the image into the local Docker daemon'
    required: false
    default: 'true'
  push:
    description: 'Whether to push the image to a registry'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build and optionally push
      id: build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        cache-from: type=gha
        cache-to: type=gha,mode=max
        context: .
        load: ${{ inputs.load }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        target: ${{ inputs.target }}
