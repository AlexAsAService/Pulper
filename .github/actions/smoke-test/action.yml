# yaml-language-server: $schema=https://json.schemastore.org/github-action
name: 'Pulper Smoke Test'
description: 'Runs the smoke test script against a specific Pulper image'

inputs:
  image:
    description: 'The full image name/tag to test'
    required: true
  target:
    description: 'The build target (full or minimal)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Run Smoke Test
      shell: bash
      env:
        TEST_IMAGE: ${{ inputs.image }}
        OUTPUT_DIR: ./output
        TARGET_DIR: /${{ inputs.target }}
      run: |
        set -euo pipefail
        ./scripts/smoke.sh "$TEST_IMAGE"
