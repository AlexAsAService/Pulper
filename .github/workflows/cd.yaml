name: CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish Images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize Registry Owner
        id: owner
        run: echo "lower=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine Version and Mode
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # Keep the v prefix for image tags: e.g. v0.1.0
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "val=${VERSION}" >> $GITHUB_OUTPUT
            echo "mode=retag" >> $GITHUB_OUTPUT
          else
            echo "val=latest" >> $GITHUB_OUTPUT
            echo "mode=build" >> $GITHUB_OUTPUT
          fi

      # On a version tag: copy the SHA-tagged images to the version tag.
      # This promotes the exact image that CI validated — no rebuild.
      - name: Retag SHA images with version
        if: steps.version.outputs.mode == 'retag'
        env:
          OWNER: ${{ steps.owner.outputs.lower }}
          VERSION: ${{ steps.version.outputs.val }}
          SHA: ${{ github.sha }}
        run: |
          SHA_TAG="sha-${SHA}"
          for REPO in pulper pulper-lite; do
            docker buildx imagetools create \
              -t "${REGISTRY}/${OWNER}/${REPO}:${VERSION}" \
              "${REGISTRY}/${OWNER}/${REPO}:${SHA_TAG}"
            docker buildx imagetools create \
              -t "${REGISTRY}/${OWNER}/${REPO}:${VERSION}-no-shim" \
              "${REGISTRY}/${OWNER}/${REPO}:${SHA_TAG}-no-shim"
          done


      # On main / dispatch: build and push all targets with bake.
      - name: Build and Push (Bake)
        if: steps.version.outputs.mode == 'build'
        uses: docker/bake-action@v7
        with:
          push: true
          set: |
            variable.TAG.value=${{ steps.version.outputs.val }}
            variable.REGISTRY.value=${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
