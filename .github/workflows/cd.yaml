name: CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish Images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # Use the git tag (e.g., 1.0.0)
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Default to latest on main
            VERSION="latest"
          fi
          echo "val=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push (Bake)
        uses: docker/bake-action@v7
        with:
          push: true
          set: |
            *.args.TAG=${{ steps.version.outputs.val }}
            *.args.REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
