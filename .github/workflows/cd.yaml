# =============================================================================
# CD — Publish to Container Registry
# =============================================================================
# Triggers on merge to main only.
# Builds and pushes both minimal and full image tags to the registry.
#
# Required secrets:
#   REGISTRY_USERNAME — registry login (e.g., DockerHub username or GHCR actor)
#   REGISTRY_TOKEN    — registry token / PAT with write:packages
#
# TODO: decide on registry (GHCR vs DockerHub) and update image name below
# =============================================================================

name: cd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. alexasaservice/pulper

jobs:
  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [minimal, full]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.target }}
            type=sha,prefix=${{ matrix.target }}-

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
