name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Normalize Registry Owner
        id: owner
        uses: ./.github/actions/to-lower
        with:
          string: ${{ github.repository_owner }}
      
      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Determine Version and Mode
        id: version
        shell: bash
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "val=${VERSION}" >> $GITHUB_OUTPUT
        
      - name: Build And Push
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO_OWNER: ${{ steps.owner.outputs.lower-case }}
          TAG: sha-${{ github.sha }}
        with:
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Retag SHA images with version
        shell: bash
        env:
          OWNER: ${{ steps.owner.outputs.lower-case }}
          VERSION: ${{ steps.version.outputs.val }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          GIT_SHA_TAG="sha-${GIT_SHA}"
          for REPO in pulper pulper-lite; do
            docker buildx imagetools create \
              -t "${REGISTRY}/${OWNER}/${REPO}:${VERSION}" \
              "${REGISTRY}/${OWNER}/${REPO}:${GIT_SHA_TAG}"
            docker buildx imagetools create \
              -t "${REGISTRY}/${OWNER}/${REPO}:${VERSION}-no-shim" \
              "${REGISTRY}/${OWNER}/${REPO}:${GIT_SHA_TAG}-no-shim"
          done
