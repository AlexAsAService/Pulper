# =============================================================================
# CI — Build and Smoke Test
# =============================================================================
# Triggers:
#   - Push to main or any open PR targeting main
#   - Manual trigger via workflow_dispatch
#
# Jobs:
#   build   — builds both minimal and full image targets
#   smoke   — runs a basic conversion against a sample file
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [minimal, full]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          tags: pulper:${{ matrix.target }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: upload image as artifact for smoke job to consume
      # (or collapse smoke into this job once tests are written)

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: load image from build job artifact
      # TODO: run smoke test script against sample file
