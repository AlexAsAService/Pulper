name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Normalize repo owner
        id: repo_owner
        uses: ./.github/actions/to-lower
        with:
          string: ${{ github.repository_owner }}

      - name: Build and Push all targets
        uses: docker/bake-action@v7
        env:
          REPO_OWNER: ${{ steps.repo_owner.outputs.lower-case }}
          REGISTRY: ${{ env.REGISTRY }}
          TAG: sha-${{ github.sha }}
        with:
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  test:
    name: Smoke Test
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        flavor: [minimal, full]
        variant: [shim, no-shim]
        include:
          - variant: no-shim
            gymnastics: true
          - variant: shim
            gymnastics: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Smoke Test
        run: |
          # Determine the image name and tag
          TARGET_NAME="${{ matrix.flavor }}-${{ matrix.variant }}"
          
          # Map flavor to image repo name
          REPO="pulper"
          if [[ "${{ matrix.flavor }}" == "minimal" ]]; then
            REPO="pulper-lite"
          fi
          
          # Map variant to tag suffix
          TAG="sha-${{ github.sha }}"
          if [[ "${{ matrix.variant }}" == "no-shim" ]]; then
            TAG="${TAG}-no-shim"
          fi
          
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${REPO}:${TAG}"
          
          # Only add the "gymnastics" for no-shim
          EXTRA_ARGS=""
          if [[ "${{ matrix.gymnastics }}" == "true" ]]; then
            EXTRA_ARGS="--user $(id -u):$(id -g) -e HOME=/tmp"
          fi
          
          # Execute the smoke test
          STAGE="${{ matrix.flavor }}" IMAGE="$IMAGE" DOCKER_OPTS="$EXTRA_ARGS" ./scripts/smoke.sh
